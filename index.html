<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF 在线预览</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
        /* 使用 Mozilla 提供的在线预览器代理，强制在网页内渲染 */
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <script>
        // 自动获取当前页面的 PDF 路径并拼接到预览器中
        window.onload = function() {
            var pdfFile = "88757ecddfa417b05e68aea3b509e9c5.pdf"; // 这里改为你仓库里 PDF 的文件名
            var viewerUrl = "https://github.io";
            // 获取当前网页的绝对路径
            var currentPath = window.location.href.substring(0, window.location.href.lastIndexOf('/') + 1);
            document.getElementById('pdf-iframe').src = viewerUrl + encodeURIComponent(currentPath + pdfFile);
        };
    </script>
    <iframe id="pdf-iframe"></iframe>
</body>
</html>
