<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文档预览</title>
    <style>
        body { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; }
        #preview { width: 100%; height: 90vh; border: none; }
        .btn { padding: 10px 20px; background: #007bff; color: white; text-decoration: none; border-radius: 5px; margin-top: 10px; }
    </style>
</head>
<body>
    <!-- 尝试直接显示 -->
    <iframe id="preview" src="88757ecddfa417b05e68aea3b509e9c5.pdf"></iframe>
    <!-- 备用下载/预览按钮，防止部分手机无法加载 iframe -->
    <a href="88757ecddfa417b05e68aea3b509e9c5.pdf" class="btn">如果无法预览，请点击此处直接打开</a>
</body>
</html>
